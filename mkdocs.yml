site_name: memio
site_url: https://y3z.ai/memio/
site_description: Unified memory gateway for AI agents
repo_url: https://github.com/y3zai/memio
repo_name: y3zai/memio

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Concepts:
    - Architecture: concepts/architecture.md
  - Providers:
    - Mem0: providers/mem0.md
    - Zep: providers/zep.md
    - Chroma: providers/chroma.md
  - Guides:
    - Custom Providers: guides/custom-providers.md
  - API Reference:
    - Client: api/client.md
    - Models: api/models.md
    - Protocols: api/protocols.md
    - Exceptions: api/exceptions.md
  - Contributing:
    - Development: contributing/development.md
    - Adding Providers: contributing/adding-providers.md
